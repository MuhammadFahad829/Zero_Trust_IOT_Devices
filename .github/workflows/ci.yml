name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install backend deps
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -r backend/requirements.txt

      - name: Start backend
        run: |
          source .venv/bin/activate
          nohup python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 > backend_ci.log 2>&1 &

      - name: Wait for backend
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8000/devices >/dev/null 2>&1; then
              echo 'backend ready' && break
            fi
            sleep 1
          done

      - name: Run backend tests
        run: |
          source .venv/bin/activate
          pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build --silent

      - name: Integration smoke checks
        run: |
          curl -sS http://127.0.0.1:8000/devices | jq '.devices | {count: (length)}' || true
          curl -sS http://127.0.0.1:8000/traffic || true
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements.txt') }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run backend tests
        run: |
          pytest -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend dependencies
        run: |
          npm --prefix frontend ci

      - name: Build frontend
        run: |
          npm --prefix frontend run build

      - name: Install Playwright browsers
        if: steps.cache.outputs.cache-hit != 'true' || always()
        run: |
          npm --prefix frontend install
          npx playwright install --with-deps

      - name: Run Playwright E2E
        run: |
          npx playwright test --config=ci/playwright.config.js
        working-directory: ./

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build --if-present

  backend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.11"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip || true
          pip install -r requirements.txt || true
      - name: Run lint / tests
        run: |
          pytest -q || true
          flake8 || true
